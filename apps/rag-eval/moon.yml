type: application
language: python

tasks:
  test:
    command: uv run pytest apps/rag-eval/tests/ -v
    options:
      runFromWorkspaceRoot: true
    inputs:
      - "apps/rag-eval/src/**/*"
      - "apps/rag-eval/tests/**/*"

  run:
    command: uv run rag-eval
    options:
      runFromWorkspaceRoot: true
    local: true
